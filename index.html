<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cache River Mill & MetalWorks</title>

  <!-- Fast redirect -->
  <meta http-equiv="refresh" content="0; url=https://cacherivermill.com/" />

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0f172a;
      color:#f1f5f9;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding:24px;
      text-align:center;
    }
    .wrap{
      max-width:560px;
      width:100%;
      background:#111c33;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      padding:28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    h1{ margin:0 0 10px; font-size:22px; letter-spacing:0.2px; }
    p{ margin:0 0 18px; opacity:0.85; line-height:1.4; }
    a.btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:12px;
      background:#d4a84b;
      color:#111827;
      text-decoration:none;
      font-weight:700;
    }
    .sub{
      margin-top:14px;
      font-size:13px;
      opacity:0.7;
    }
    .links{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    a.link{
      color:#93c5fd;
      text-decoration:none;
      font-size:13px;
      opacity:0.9;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Cache River Mill & MetalWorks</h1>
    <p>Redirecting to our website…</p>
    <a class="btn" href="https://cacherivermill.com/">Open Company Website</a>

    <div class="links">
      <a class="link" href="https://cacherivermill.com/">Website</a>
      <a class="link" href="/Cache-River-Contacts/nwade/">My card</a>
      <a class="link" href="/Cache-River-Contacts/contacts/">Contacts</a>
    </div>

    <div class="sub">If you are not redirected automatically, tap the button above.</div>
  </div>
</body>
</html>
